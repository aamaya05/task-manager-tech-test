<div class="min-vh-100 d-flex align-items-center justify-content-center bg-light">
  <div class="card shadow-sm" style="width: 100%; max-width: 420px;">
    <div class="card-body p-4">
      <h1 class="card-title h4 mb-1 fw-bold text-center">TaskManager</h1>
      <p class="text-center text-muted mb-4 small">Sign in to your account</p>

      <div *ngIf="errorMessage" class="alert alert-danger py-2 small" role="alert">
        {{ errorMessage }}
      </div>

      <form (ngSubmit)="onSubmit()" #loginForm="ngForm" novalidate>
        <div class="mb-3">
          <label for="email" class="form-label fw-medium">Email</label>
          <input
            id="email"
            type="email"
            class="form-control"
            [(ngModel)]="email"
            name="email"
            placeholder="you@example.com"
            required
            autocomplete="email"
          />
        </div>

        <div class="mb-4">
          <label for="password" class="form-label fw-medium">Password</label>
          <input
            id="password"
            type="password"
            class="form-control"
            [(ngModel)]="password"
            name="password"
            placeholder="••••••••"
            required
            autocomplete="current-password"
          />
        </div>

        <button
          type="submit"
          class="btn btn-primary w-100"
          [disabled]="loading"
        >
          <span *ngIf="loading" class="spinner-border spinner-border-sm me-2" role="status"></span>
          {{ loading ? 'Signing in...' : 'Sign In' }}
        </button>
      </form>

      <hr class="my-3" />
      <p class="text-center text-muted small mb-0">
        No account?
        <a routerLink="/register" class="text-decoration-none">Register</a>
      </p>
    </div>
  </div>
</div>
